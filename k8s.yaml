apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-similarity
  labels:
    app: product-similarity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-similarity
  template:
    metadata:
      labels:
        app: product-similarity
    spec:
      containers:
        - name: product-similarity
          image: product-similarity:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            # Give the index time to build on startup before receiving traffic
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: product-similarity
spec:
  selector:
    app: product-similarity
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
